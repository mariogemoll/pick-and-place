# Visual behavior cloning using the official DPPO implementation pinned by the
# third_party/dppo submodule. Optimization follows its v0.8 Robomimic visual
# MLP defaults. Keep architecture and diffusion settings synchronized with the
# later fine-tuning configuration.
defaults:
  - _self_

hydra:
  run:
    dir: ${logdir}

_target_: agent.pretrain.train_diffusion_agent.TrainDiffusionAgent

name: so101_pre_diffusion_mlp_img_ta${horizon_steps}_td${denoising_steps}
logdir: ${oc.env:DPPO_LOG_DIR}/pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: ${oc.env:DPPO_DATA_DIR}/train.npz

seed: 42
device: cuda:0
obs_dim: 6
action_dim: 6
denoising_steps: 100
horizon_steps: 4
cond_steps: 1
img_cond_steps: 1

wandb:
  entity: null
  project: pick-and-place
  run: ${now:%H-%M-%S}_${name}

shape_meta:
  obs:
    # RGB channels from overhead and wrist, in that order.
    rgb:
      shape: [6, 96, 96]
    state:
      shape: [6]
  action:
    shape: [6]

train:
  n_epochs: 2000
  batch_size: 256
  learning_rate: 1e-4
  weight_decay: 1e-6
  log_freq: 1
  lr_scheduler:
    first_cycle_steps: 2000
    warmup_steps: 100
    min_lr: 1e-5
  save_model_freq: 500

model:
  _target_: model.diffusion.diffusion.DiffusionModel
  predict_epsilon: true
  denoised_clip_value: 1.0
  network:
    _target_: model.diffusion.mlp_diffusion.VisionDiffusionMLP
    backbone:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      # Camera views are split by VisionDiffusionMLP before this shared encoder.
      num_channel: ${eval:'3 * ${img_cond_steps}'}
      img_h: ${shape_meta.obs.rgb.shape[1]}
      img_w: ${shape_meta.obs.rgb.shape[2]}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    num_img: 2
    img_cond_steps: ${img_cond_steps}
    augment: true
    spatial_emb: 128
    time_dim: 32
    mlp_dims: [512, 512, 512]
    residual_style: true
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: ${denoising_steps}
  device: ${device}

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  use_img: true
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  max_n_episodes: 1000
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  # The complete two-camera image tensor is about 16 GB. Keep it in host RAM
  # and transfer batches instead of placing the full dataset on the GPU.
  device: cpu
